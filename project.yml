name: Forge
options:
  bundleIdPrefix: com.forge
  deploymentTarget:
    iOS: "16.0"
packages:
  ForgeCore:
    path: .
  PostHog:
    url: https://github.com/PostHog/posthog-ios.git
    from: 3.0.0
targets:
  Forge:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "Config/Secrets.example.swift"
    dependencies:
      - package: ForgeCore
        product: ForgeCore
      - package: PostHog
        product: PostHog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forge.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        NSCameraUsageDescription: "Used to scan a food barcode instead of typing it in."
    entitlements:
      path: App/Forge.entitlements
      properties:
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers: ["iCloud.com.forge.app"]
