name: Forge
options:
  bundleIdPrefix: com.epworthlabs
  deploymentTarget:
    iOS: "16.0"
packages:
  ForgeCore:
    path: .
  PostHog:
    url: https://github.com/PostHog/posthog-ios.git
    from: 3.0.0
targets:
  Forge:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - "Config/Secrets.example.swift"
    dependencies:
      - package: ForgeCore
        product: ForgeCore
      - package: PostHog
        product: PostHog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.epworthlabs.forge
        # Feature request — "let's name the app: Trakt." Display name only — bundle identifier and
        # the CloudKit container (iCloud.com.epworthlabs.forge, below) are both internal, invisible
        # to users, and changing either would mean a brand-new CloudKit container + re-provisioning
        # rather than a rename. PRODUCT_NAME drives Info.plist's CFBundleName; explicit
        # CFBundleDisplayName below is belt-and-suspenders for whichever one a given context reads.
        PRODUCT_NAME: Trakt
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        # Real Apple Developer team, confirmed working for on-device CloudKit verification earlier
        # this session — Automatic signing has no team to resolve without this, which blocks
        # archiving/uploading to App Store Connect even though it doesn't block Simulator builds.
        DEVELOPMENT_TEAM: 88XVUU2829
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        # App icon design (5a — "Dual Ring, Bold") pulled from the claude.ai/design project and
        # rendered to App/Assets.xcassets/AppIcon.appiconset.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Trakt
        NSHealthShareUsageDescription: "Used to factor your steps and sleep into your daily targets."
        # Apple's binary scanner requires this key for any app linking HealthKit, regardless of
        # whether write access is actually used — Trakt is read-only (requestAuthorization always
        # passes toShare: []), confirmed by grepping HealthKitManager before adding this.
        NSHealthUpdateUsageDescription: "Trakt does not write any data to Health."
        # Every network call in the app is standard HTTPS/TLS (URLSession to USDA, Open Food
        # Facts, the FoodProxy, CloudKit, PostHog) — no custom/proprietary encryption — so this
        # qualifies for App Store Connect's export compliance exemption. Setting it explicitly
        # skips the encryption questionnaire on every future TestFlight/App Store upload.
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: App/Forge.entitlements
      properties:
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers: ["iCloud.com.epworthlabs.forge"]
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        # Re-added for launch — disconnected earlier this session only because it was blocking
        # Simulator testing with no team ID set (see DEVELOPMENT_TEAM above, now fixed).
        com.apple.developer.applesignin: [Default]
