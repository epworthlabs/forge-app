name: Forge
options:
  bundleIdPrefix: com.forge
  deploymentTarget:
    iOS: "16.0"
packages:
  ForgeCore:
    path: .
targets:
  Forge:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: ForgeCore
        product: ForgeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.forge.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
    entitlements:
      path: App/Forge.entitlements
      properties:
        com.apple.developer.icloud-services: [CloudKit]
        com.apple.developer.icloud-container-identifiers: ["iCloud.com.forge.app"]
